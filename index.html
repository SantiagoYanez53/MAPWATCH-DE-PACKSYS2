<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radar de Competencia - Prototipo</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background-color: #f4f4f9; color: #333; }
        .container { max-width: 800px; margin: 0 auto; }
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
        h2 { margin-top: 0; color: #0056b3; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input[type="text"] { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { background-color: #0056b3; color: white; border: none; padding: 10px 15px; border-radius: 4px; cursor: pointer; font-size: 16px; }
        button:hover { background-color: #004494; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h2>1. Tu Catálogo (Simulado)</h2>
        <div class="form-group">
            <label>Producto a buscar:</label>
            <input type="text" id="productoPrueba" value="Fender Debut Negra">
        </div>
        <button onclick="buscarEnML()">🔍 Buscar en Mercado Libre</button>
    </div>

    <div class="card">
        <h2>2. Registrar Evidencia de la Competencia</h2>
        
        <button id="btnPegar" type="button" style="width: 100%; margin-bottom: 15px; background-color: #28a745;">📋 Pegar Datos del Marcador</button>
        <p id="mensajePegado" style="color: green; display: none; font-weight: bold; text-align: center; margin-bottom: 15px;"></p>

        <div class="form-group">
            <label>Título en ML:</label>
            <input type="text" id="mlTitulo" readonly>
        </div>
        <div class="form-group">
            <label>Precio:</label>
            <input type="text" id="mlPrecio" readonly>
        </div>
        <div class="form-group">
            <label>Vendedor:</label>
            <input type="text" id="mlVendedor" readonly>
        </div>
        <div class="form-group">
            <label>Enlace:</label>
            <input type="text" id="mlEnlace" readonly>
        </div>
    </div>
</div>

<script>
    // --- FUNCIÓN 1: El botón de búsqueda ---
    function buscarEnML() {
        const titulo = document.getElementById('productoPrueba').value;
        if (!titulo) return alert('Ingresa un título válido');
        const queryFormateada = titulo.trim().toLowerCase().replace(/\s+/g, '-');
        window.open(`https://listado.mercadolibre.com.mx/${queryFormateada}`, '_blank');
    }

    // --- FUNCIÓN 2: Botón de Pegado Automático ---
    const btnPegar = document.getElementById('btnPegar');
    const mensajePegado = document.getElementById('mensajePegado');

    btnPegar.addEventListener('click', async () => {
        try {
            const textoPegado = await navigator.clipboard.readText();
            const datosCompetencia = JSON.parse(textoPegado);
            
            document.getElementById('mlTitulo').value = datosCompetencia.titulo || 'No encontrado';
            document.getElementById('mlPrecio').value = datosCompetencia.precio || 'No encontrado';
            document.getElementById('mlVendedor').value = datosCompetencia.vendedor || 'No encontrado';
            document.getElementById('mlEnlace').value = datosCompetencia.link || 'No encontrado';
            
            mensajePegado.innerText = "¡Datos extraídos con éxito! ✅";
            mensajePegado.style.display = "block";
            setTimeout(() => { mensajePegado.style.display = "none"; }, 3000);

        } catch (error) {
            alert('❌ Error al pegar: Es posible que el simulador web bloquee el acceso al portapapeles o no has copiado un JSON válido.');
            console.error('Detalle del error:', error);
        }
    });
</script>

</body>
</html>
