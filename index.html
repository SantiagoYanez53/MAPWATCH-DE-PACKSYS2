<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radar de Competencia</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div id="root">
        <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background-color: #181D28; color: #C9A227; font-family: sans-serif;">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="animation: spin 1s linear infinite; margin-bottom: 15px;">
                <line x1="12" y1="2" x2="12" y2="6"></line>
                <line x1="12" y1="18" x2="12" y2="22"></line>
                <line x1="4.93" y1="4.93" x2="7.76" y2="7.76"></line>
                <line x1="16.24" y1="16.24" x2="19.07" y2="19.07"></line>
                <line x1="2" y1="12" x2="6" y2="12"></line>
                <line x1="18" y1="12" x2="22" y2="12"></line>
                <line x1="4.93" y1="19.07" x2="7.76" y2="16.24"></line>
                <line x1="16.24" y1="4.93" x2="19.07" y2="7.76"></line>
            </svg>
            <h2>Cargando Radar de Competencia...</h2>
            <p style="color: #9198A8; font-size: 14px;">Conectando con la base de datos</p>
        </div>
        <style>
            @keyframes spin { 100% { transform: rotate(360deg); } }
        </style>
    </div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;
        
        const Icon = ({ name, size = 18, color = "currentColor" }) => {
            useEffect(() => { lucide.createIcons(); });
            return <i data-lucide={name} style={{ width: size, height: size, color, display: 'inline-block' }} />;
        };
        const Upload = (p) => <Icon name="upload" {...p} />;
        const Search = (p) => <Icon name="search" {...p} />;
        const ClipboardPaste = (p) => <Icon name="clipboard-paste" {...p} />;
        const Save = (p) => <Icon name="save" {...p} />;
        const Trash2 = (p) => <Icon name="trash-2" {...p} />;
        const Download = (p) => <Icon name="download" {...p} />;
        const ImageIcon = (p) => <Icon name="image" {...p} />;
        const ChevronRight = (p) => <Icon name="chevron-right" {...p} />;
        const Guitar = (p) => <Icon name="guitar" {...p} />;
        const Link2 = (p) => <Icon name="link-2" {...p} />;
        const Tag = (p) => <Icon name="tag" {...p} />;
        const Store = (p) => <Icon name="store" {...p} />;

        window.storage = {
            get: async (key) => ({ value: localStorage.getItem(key) }),
            set: async (key, value) => localStorage.setItem(key, value),
            delete: async (key) => localStorage.removeItem(key)
        };
    </script>

    <script type="text/babel" src="./rastreador-competencia-ml.jsx"></script>

    <script type="text/babel">
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
